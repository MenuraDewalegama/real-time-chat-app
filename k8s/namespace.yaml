apiVersion: v1
kind: Namespace
metadata:
  name: chat-app
  labels:
    app.kubernetes.io/name: chat-app
    environment: production
---
# ServiceAccount for backend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-backend-sa
  namespace: chat-app
automountServiceAccountToken: false
---
# ServiceAccount for frontend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-frontend-sa
  namespace: chat-app
automountServiceAccountToken: false
