# ============================================================
# Network Policies — Zero-trust micro-segmentation
# Each service can only talk to the services it needs.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, etc.)
# ============================================================

# ── Default deny all ingress+egress in namespace ─────────────
# This "deny-all" baseline forces explicit allowance below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: chat-app
spec:
  podSelector: {}       # Applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress
---
# ── Allow DNS egress (all pods need DNS) ─────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: chat-app
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Backend: ingress from ingress-nginx + frontend ────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress-policy
  namespace: chat-app
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress-nginx controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3001
    # Allow traffic from frontend pods (server-side calls)
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 3001
  egress:
    # Backend → MongoDB
    - to:
        - podSelector:
            matchLabels:
              app: mongo
      ports:
        - port: 27017
    # Backend → Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
---
# ── Frontend: ingress from ingress-nginx only ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress-policy
  namespace: chat-app
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
  egress:
    # Frontend server → backend (server-side API calls)
    - to:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 3001
---
# ── MongoDB: only accept from backend ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongo-ingress-policy
  namespace: chat-app
spec:
  podSelector:
    matchLabels:
      app: mongo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 27017
---
# ── Redis: only accept from backend ───────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress-policy
  namespace: chat-app
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 6379
