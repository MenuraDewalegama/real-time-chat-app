# ============================================================
# Monitoring & Alerting — Prometheus + Alertmanager integration
# Requires: prometheus-operator (kube-prometheus-stack) installed
# Install: helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack -n monitoring
# ============================================================

# ── ServiceMonitor: Backend metrics scraping ──────────────────
# Assumes backend exposes /metrics on port 3001
# (add prom-client to your Node.js app to expose metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: chat-app
  labels:
    app: backend
    # This label must match your Prometheus operator's serviceMonitorSelector
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http-ws
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
# ── PrometheusRule: Alerting rules ───────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: chat-app-alerts
  namespace: chat-app
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: chat-app
spec:
  groups:
    - name: chat-app.availability
      interval: 30s
      rules:
        # Alert if backend has zero ready pods
        - alert: BackendPodsDown
          expr: |
            kube_deployment_status_replicas_ready{namespace="chat-app", deployment="backend"} == 0
          for: 1m
          labels:
            severity: critical
            namespace: chat-app
          annotations:
            summary: "All backend pods are down"
            description: "The chat backend has 0 ready replicas. WebSocket service is unavailable."

        # Alert if backend is below desired replica count
        - alert: BackendReplicasReduced
          expr: |
            kube_deployment_status_replicas_ready{namespace="chat-app", deployment="backend"}
              < kube_deployment_spec_replicas{namespace="chat-app", deployment="backend"}
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Backend replicas below desired count"
            description: "Backend has {{ $value }} ready replicas but desired is higher."

        # Alert on high HPA scale — approaching max
        - alert: BackendHPAMaxReplicas
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="chat-app", horizontalpodautoscaler="backend-hpa"}
              >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="chat-app", horizontalpodautoscaler="backend-hpa"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Backend HPA has reached max replicas"
            description: "Backend is at maximum pod count. Consider increasing maxReplicas or optimizing the application."

    - name: chat-app.performance
      interval: 60s
      rules:
        # Alert on high CPU usage
        - alert: BackendHighCPU
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="chat-app", container="backend"}[5m]) > 0.45
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Backend pod CPU usage is high"
            description: "Backend pod {{ $labels.pod }} CPU is above 90% of its request for 5 minutes."

        # Alert on high memory usage
        - alert: BackendHighMemory
          expr: |
            container_memory_working_set_bytes{namespace="chat-app", container="backend"}
              / kube_pod_container_resource_limits{namespace="chat-app", container="backend", resource="memory"}
              > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Backend pod memory usage is high"
            description: "Backend pod {{ $labels.pod }} memory is above 85% of its limit."

    - name: chat-app.storage
      interval: 60s
      rules:
        # Alert when MongoDB PVC is 80%+ full
        - alert: MongoDiskFillingUp
          expr: |
            kubelet_volume_stats_used_bytes{namespace="chat-app", persistentvolumeclaim=~"mongo-data.*"}
              / kubelet_volume_stats_capacity_bytes{namespace="chat-app", persistentvolumeclaim=~"mongo-data.*"}
              > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MongoDB disk usage above 80%"
            description: "MongoDB PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full."
---
# ── Grafana Dashboard ConfigMap ───────────────────────────────
# A lightweight dashboard definition for importing into Grafana
apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-app-dashboard
  namespace: chat-app
  labels:
    grafana_dashboard: "1"    # Grafana sidecar picks this up automatically
data:
  chat-app-dashboard.json: |
    {
      "title": "Chat App Overview",
      "uid": "chat-app-overview",
      "panels": [
        {
          "title": "Backend Ready Replicas",
          "type": "stat",
          "targets": [{"expr": "kube_deployment_status_replicas_ready{namespace=\"chat-app\",deployment=\"backend\"}"}]
        },
        {
          "title": "HPA Current Replicas",
          "type": "graph",
          "targets": [{"expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"chat-app\"}"}]
        },
        {
          "title": "Backend CPU Usage",
          "type": "graph",
          "targets": [{"expr": "rate(container_cpu_usage_seconds_total{namespace=\"chat-app\",container=\"backend\"}[5m])"}]
        },
        {
          "title": "MongoDB Disk Usage",
          "type": "gauge",
          "targets": [{"expr": "kubelet_volume_stats_used_bytes{namespace=\"chat-app\"} / kubelet_volume_stats_capacity_bytes{namespace=\"chat-app\"}"}]
        }
      ]
    }
