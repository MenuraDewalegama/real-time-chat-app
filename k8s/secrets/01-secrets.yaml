# ============================================================
# Kubernetes Secrets for Real-Time Chat Application
# ============================================================
# IMPORTANT: In production, use a secrets manager (e.g., Vault,
# AWS Secrets Manager) or Sealed Secrets to manage these values.
# The base64-encoded values below are PLACEHOLDERS — replace them
# before deploying to any real environment.
#
# Encode your own values:
#   echo -n "your-value" | base64
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: chat-app-secrets
  namespace: chat-app
  labels:
    app.kubernetes.io/name: chat-app
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # JWT signing secret — replace with a strong random string (32+ chars)
  # echo -n "your-super-secret-jwt-key-change-me" | base64
  JWT_SECRET: eW91ci1zdXBlci1zZWNyZXQtand0LWtleS1jaGFuZ2UtbWU=

  # MongoDB connection URI
  # echo -n "mongodb://chatuser:chatpass@mongo:27017/chat?authSource=admin" | base64
  MONGO_URL: bW9uZ29kYjovL2NoYXR1c2VyOmNoYXRwYXNzQG1vbmdvOjI3MDE3L2NoYXQ/YXV0aFNvdXJjZT1hZG1pbg==

  # MongoDB admin credentials
  # echo -n "chatadmin" | base64
  MONGO_INITDB_ROOT_USERNAME: Y2hhdGFkbWlu
  # echo -n "adminpassword123" | base64
  MONGO_INITDB_ROOT_PASSWORD: YWRtaW5wYXNzd29yZDEyMw==

  # MongoDB app user credentials
  # echo -n "chatuser" | base64
  MONGO_USERNAME: Y2hhdHVzZXI=
  # echo -n "chatpass" | base64
  MONGO_PASSWORD: Y2hhdHBhc3M=

  # Redis auth password (optional but recommended in production)
  # echo -n "redis-password-change-me" | base64
  REDIS_PASSWORD: cmVkaXMtcGFzc3dvcmQtY2hhbmdlLW1l
