# ============================================================
# Horizontal Pod Autoscaler (HPA)
# Automatically scales pods based on CPU + memory usage
# ============================================================

# ── Backend HPA ───────────────────────────────────────────────
# Scales from 3 → 10 replicas based on CPU & memory load.
# During peak chat usage (high WebSocket connections + message
# throughput), CPU and memory climb → HPA adds pods.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: chat-app
  labels:
    app.kubernetes.io/name: chat-app
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # Scale up when average CPU across pods exceeds 60%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # Scale up when average memory across pods exceeds 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  # Scaling behavior: fast scale-up, slow scale-down
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30       # React quickly to spikes
      policies:
        - type: Pods
          value: 2                         # Add max 2 pods at once
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300      # Wait 5 min before shrinking
      policies:
        - type: Pods
          value: 1                         # Remove 1 pod at a time
          periodSeconds: 120
---
# ── Frontend HPA ──────────────────────────────────────────────
# Frontend is stateless, scales aggressively on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: chat-app
  labels:
    app.kubernetes.io/name: chat-app
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
