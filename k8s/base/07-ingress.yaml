# ============================================================
# Ingress — NGINX-based, WebSocket upgrade support, TLS-ready
# Requires: ingress-nginx controller installed in cluster
# Install: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-ingress
  namespace: chat-app
  labels:
    app.kubernetes.io/name: chat-app
    app.kubernetes.io/component: ingress
  annotations:
    # NGINX ingress controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"

    # ── WebSocket support ──────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # Tell NGINX to pass Upgrade/Connection headers for WS
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # ── SSL/TLS redirect ──────────────────────────────────
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # ── Body size (for file uploads) ──────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # ── Rate limiting ──────────────────────────────────────
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # ── cert-manager TLS (uncomment when cert-manager is installed)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - chat.yourdomain.com
  #     secretName: chat-tls-cert
  rules:
    - host: chat.yourdomain.com     # ← Replace with your domain
      http:
        paths:
          # WebSocket backend path
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001
          # Auth API routes
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001
          # Frontend — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8080
