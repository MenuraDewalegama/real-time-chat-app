<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <!-- ✅ FIX 1: Removed hardcoded window.WS_URL = "ws://backend-service:3001/ws"
       Browsers cannot reach Kubernetes-internal hostnames.
       chat.js already derives the correct WS URL from window.location automatically. -->
</head>
<body>

<h2>Chat App</h2>

<button onclick="logout()">Logout</button>

<div style="display:flex; gap:10px; margin-top:10px;">

  <!-- Online Users sidebar -->
  <div style="width:200px; border:1px solid #ccc; padding:10px;">
    <h4>Online Users</h4>
    <div id="users"></div>
  </div>

  <!-- Chat area -->
  <div style="flex:1; border:1px solid #ccc; padding:10px;">
    <div id="box" style="height:300px; overflow:auto;"></div>

    <hr/>

    <div>Chatting with: <b id="chatWith">Everyone</b></div>
    <br/>
    <input id="msg" placeholder="Type message..." style="width:70%;"
           onkeydown="if(event.key==='Enter') sendMessage()" />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="chat.js"></script>

</body>
</html>
